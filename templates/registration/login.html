<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión | Organización Docente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#0f3d5e] via-[#115b83] to-[#1a928d] flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 rounded-2xl bg-[#0f3d5e] flex items-center justify-center text-white text-2xl font-black">
                OD
            </div>

            <h1 class="text-2xl font-black text-slate-800 mt-4">
                Organización Docente
            </h1>

            <p class="text-slate-500 text-sm mt-1">
                Control administrativo de postgrado
            </p>
        </div>

        {% if form.errors %}
            <div class="mb-5 bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-sm">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">
                    Usuario
                </label>
                <input type="text"
                       name="username"
                       autofocus
                       required
                       class="w-full rounded-xl border-slate-300 px-4 py-3 border focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">
                    Contraseña
                </label>
                <input type="password"
                       name="password"
                       required
                       class="w-full rounded-xl border-slate-300 px-4 py-3 border focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <button type="submit"
                    class="w-full bg-[#0f3d5e] hover:bg-[#115b83] text-white font-bold py-3 rounded-xl transition shadow-lg">
                Iniciar sesión
            </button>
        </form>
    </div>

</body>
</html>
